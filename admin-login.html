<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>NVR Admin Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body class="login-body">

    <div class="container">

        <div class="row min-vh-100 justify-content-center align-items-center">

            <div class="col-11 col-sm-10 col-md-6 col-lg-4">

                <div class="login-card">

                    <!-- LOGO -->

                    <div class="text-center mb-4">

                        <div class="logo-box">

                            <img
                                src="assets/images/nvr-logo.jpeg"
                                alt="NVR Agencies"
                                class="logo-img">

                        </div>

                        <h2 class="app-title">
                            NVR Admin
                        </h2>

                        <p class="app-subtitle">
                            Water Delivery Management Panel
                        </p>
                        <div class="admin-badge">
    ADMIN PANEL
</div>
                    </div>

                    <!-- EMAIL -->

                    <div class="mb-3">

                        <label class="form-label">
                            Admin Email
                        </label>

                        <input
                            type="email"
                            id="email"
                            class="form-control custom-input"
                            placeholder="Enter Admin Email">

                    </div>

                    <!-- PASSWORD -->

                    <div class="mb-4">

                        <label class="form-label">
                            Password
                        </label>

                        <input
                            type="password"
                            id="password"
                            class="form-control custom-input"
                            placeholder="Enter Password">

                    </div>

                    <!-- LOGIN BUTTON -->

                    <button
                        id="loginBtn"
                        class="btn login-btn">

                        Login To Dashboard

                    </button>

                    <!-- BACK -->

                    <div class="text-center mt-4">

                        <a href="login.html"
                           class="register-link">

                            Customer Login

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script type="module"
            src="js/admin-login.js"></script>

</body>

</html>
