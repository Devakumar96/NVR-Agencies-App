<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>My Profile - NVR Agencies</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet">
          <link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body class="home-body">

    <!-- NAVBAR -->

    <nav class="navbar home-navbar">

        <div class="container">

            <a href="index.html"
               class="navbar-brand d-flex align-items-center text-decoration-none">

                <div class="nav-logo">

                    <img src="assets/images/nvr-logo.jpeg"
                         alt="NVR Agencies"
                         class="nav-logo-img">

                </div>

                <span class="brand-name">
                    NVR Agencies
                </span>

            </a>

            <a href="index.html"
               class="btn btn-sm btn-outline-dark">

                Back

            </a>

        </div>

    </nav>

    <!-- HERO -->

    <section class="container mt-4">

        <div class="hero-card">

            <h2>
                👤 My Profile
            </h2>

            <p>
                Manage your account information
            </p>

        </div>

    </section>

    <!-- PROFILE CARD -->

    <section class="container mt-4 mb-5">

        <div class="profile-card">

            <div class="text-center mb-4">

                <div class="profile-avatar">

    <img src="assets/images/nvr-logo.jpeg"
         class="profile-logo"
         alt="Logo">

</div>

                <h4 class="mt-3">
                    Customer Profile
                </h4>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Full Name
                </label>

                <input
                    type="text"
                    id="name"
                    class="form-control custom-input">

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Mobile Number
                </label>

                <input
                    type="text"
                    id="mobile"
                    class="form-control custom-input">

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Delivery Address
                </label>

                <textarea
                    id="address"
                    rows="3"
                    class="form-control custom-input custom-textarea"></textarea>

            </div>

            <div class="mb-4">

                <label class="form-label">
                    Email Address
                </label>

                <input
                    type="email"
                    id="email"
                    class="form-control custom-input"
                    readonly>

            </div>

            <button
                id="saveBtn"
                class="btn login-btn">

                Save Profile

            </button>

        </div>

    </section>

    <!-- FOOTER -->

    <footer class="footer-section">

        <div class="container text-center">

            <h5>
                NVR Agencies
            </h5>

            <p>
                Trusted Drinking Water Delivery Service
            </p>

            <small>
                © 2026 NVR Agencies. All Rights Reserved.
            </small>

        </div>

    </footer>

        <div class="mobile-footer">


<a href="profile.html"
   class="footer-item active">

    <i class="bi bi-person-fill"></i>

    <span>Profile</span>

</a>

<a href="order.html"
   class="footer-item">

    <i class="bi bi-box-seam-fill footer-orders"></i>

    <span>Orders</span>

</a>

<a href="index.html"
   class="footer-item">

    <i class="bi bi-house-fill"></i>

    <span>Home</span>

</a>

<a href="my-orders.html"
   class="footer-item">

    <i class="bi bi-droplet-fill footer-products"></i>

    <span>Products</span>

</a>

<a href="#"
   id="logoutBtn"
   class="footer-item">

    <i class="bi bi-box-arrow-right footer-logout"></i>

    <span>Logout</span>

</a>


</div>



    <script type="module"
            src="js/profile.js"></script>
             <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
