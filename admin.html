<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>NVR Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body class="home-body">

    <!-- NAVBAR -->

    <nav class="navbar home-navbar">

        <div class="container">

            <a href="#"
               class="navbar-brand d-flex align-items-center text-decoration-none">

                <div class="nav-logo">

                    <img src="assets/images/nvr-logo.jpeg"
                         alt="NVR Agencies"
                         class="nav-logo-img">

                </div>

                <span class="brand-name">
                    NVR Admin
                </span>

            </a>

            <div>

                <button
                    onclick="location.reload()"
                    class="btn btn-warning me-2">

                    Refresh

                </button>

                <button
                    id="logoutBtn"
                    class="btn btn-danger">

                    Logout

                </button>

            </div>

        </div>

    </nav>

    <!-- HERO -->

    <section class="container mt-4">

        <div class="hero-card">

            <h2>
                🚚 Admin Dashboard
            </h2>

            <p>
                Manage Customer Orders & Deliveries
            </p>

        </div>

    </section>

    <!-- DASHBOARD STATS -->

    <section class="container mt-4">

        <div class="row g-3">

            <div class="col-6 col-md-3">

                <div class="admin-stat-card">

                    <h3 id="totalOrders">
                        0
                    </h3>

                    <p>
                        Total Orders
                    </p>

                </div>

            </div>

            <div class="col-6 col-md-3">

                <div class="admin-stat-card">

                    <h3 id="pendingOrders">
                        0
                    </h3>

                    <p>
                        Pending
                    </p>

                </div>

            </div>

            <div class="col-6 col-md-3">

                <div class="admin-stat-card">

                    <h3 id="deliveredOrders">
                        0
                    </h3>

                    <p>
                        Delivered
                    </p>

                </div>

            </div>

            <div class="col-6 col-md-3">

                <div class="admin-stat-card">

                    <h3 id="todayOrders">
                        0
                    </h3>

                    <p>
                        Today
                    </p>

                </div>

            </div>

        </div>

    </section>

    <!-- ORDERS LIST -->

    <section class="container mt-4 mb-5">

        <div class="orders-wrapper">

            <div class="d-flex justify-content-between align-items-center mb-4">

                <h4>
                    Customer Orders
                </h4>

                <span class="badge order-count-badge">

                    Live Orders

                </span>

            </div>

            <div id="ordersContainer">

                <div class="text-center py-5">

                    <div class="spinner-border text-warning"></div>

                    <p class="mt-3">

                        Loading Orders...

                    </p>

                </div>

            </div>

        </div>

    </section>

    <!-- FOOTER -->

    <footer class="footer-section">

        <div class="container text-center">

            <h5>
                NVR Agencies Admin Panel
            </h5>

            <p>
                Water Delivery Management System
            </p>

            <small>
                © 2026 NVR Agencies
            </small>

        </div>

    </footer>

    <script type="module"
            src="js/admin.js"></script>

</body>

</html>
