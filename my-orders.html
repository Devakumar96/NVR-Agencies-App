<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>My Orders - NVR Agencies</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body class="home-body">

    <!-- NAVBAR -->

    <nav class="navbar home-navbar">

        <div class="container">

            <a href="index.html"
               class="navbar-brand d-flex align-items-center text-decoration-none">

                <div class="nav-logo">

                    <img src="assets/images/nvr-logo.jpeg"
                         alt="NVR Agencies"
                         class="nav-logo-img">

                </div>

                <span class="brand-name">
                    NVR Agencies
                </span>

            </a>

            <a href="index.html"
               class="btn btn-sm btn-outline-dark">

                Back

            </a>

        </div>

    </nav>

    <!-- HERO -->

    <section class="container mt-4">

        <div class="hero-card">

            <h2>
                📦 My Orders
            </h2>

            <p>
                Track all your water can orders here
            </p>

        </div>

    </section>

    <!-- ORDERS SECTION -->

    <section class="container mt-4 mb-5">

        <div class="orders-wrapper">

            <div class="d-flex justify-content-between align-items-center mb-3">

                <h4>
                    Order History
                </h4>

                <span class="badge order-count-badge">
                    Orders
                </span>

            </div>

            <div id="ordersContainer">

                <div class="text-center py-5">

                    <div class="spinner-border text-warning"></div>

                    <p class="mt-3">
                        Loading Orders...
                    </p>

                </div>

            </div>

        </div>

    </section>

    <!-- FOOTER -->

    <footer class="footer-section">

        <div class="container text-center">

            <h5>
                NVR Agencies
            </h5>

            <p>
                Trusted Drinking Water Delivery Service
            </p>

            <small>
                © 2026 NVR Agencies. All Rights Reserved.
            </small>

        </div>

    </footer>

    <script type="module"
            src="js/my-orders.js"></script>

</body>

</html>
