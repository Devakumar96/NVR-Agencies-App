<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Create Account - NVR Agencies</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

</head>

<body class="login-body">

<div class="container-fluid">

    <div class="row min-vh-100 justify-content-center align-items-center">

        <div class="col-11 col-sm-10 col-md-7 col-lg-5">

            <div class="login-card">

               <div class="text-center mb-4">

    <div class="logo-box">

        <img
            src="assets/images/nvr-logo.jpeg"
            alt="NVR Agencies Logo"
            class="logo-img">

    </div>

    <h2 class="app-title">
        NVR Agencies
    </h2>

    <p class="app-subtitle">
        Pure Drinking Water Delivery
    </p>

</div>

                <div class="mb-3">

                    <label class="form-label">
                        Full Name
                    </label>

                    <input
                        type="text"
                        id="name"
                        class="form-control custom-input"
                        placeholder="Enter Full Name">

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Mobile Number
                    </label>

                    <input
                        type="tel"
                        id="mobile"
                        class="form-control custom-input"
                        placeholder="Enter Mobile Number">

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Delivery Address
                    </label>

                    <textarea
                        id="address"
                        rows="3"
                        class="form-control custom-input custom-textarea"
                        placeholder="Enter Delivery Address"></textarea>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Email Address
                    </label>

                    <input
                        type="email"
                        id="email"
                        class="form-control custom-input"
                        placeholder="Enter Email">

                </div>

                <div class="mb-4">

                    <label class="form-label">
                        Password
                    </label>

                    <input
                        type="password"
                        id="password"
                        class="form-control custom-input"
                        placeholder="Create Password">

                </div>

                <button
                    id="registerBtn"
                    class="btn login-btn">

                    Create Account

                </button>

                <div class="text-center mt-4">

                    <span class="register-text">
                        Already have an account?
                    </span>

                    <br>

                    <a href="login.html"
                       class="register-link">

                        Login Here

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

<script type="module" src="js/auth.js"></script>

</body>

</html>
