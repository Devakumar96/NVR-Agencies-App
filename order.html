<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Water Can</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container mt-4">

    <h2 class="text-center mb-4">
        Order Water Can
    </h2>

   <div class="card p-3 shadow-sm">

    <div class="mb-3">

        <label class="form-label">
            Customer Name
        </label>

        <input
            type="text"
            id="customerName"
            class="form-control"
            readonly>

    </div>

    <div class="mb-3">

        <label class="form-label">
            Mobile Number
        </label>

        <input
            type="text"
            id="mobile"
            class="form-control"
            readonly>

    </div>

    <div class="mb-3">

        <label class="form-label">
            Delivery Address
        </label>

        <textarea
            id="address"
            class="form-control"
            rows="3"
            readonly></textarea>

    </div>

    <div class="mb-3">

        <label class="form-label">
            Quantity
        </label>

        <input
            type="number"
            id="quantity"
            class="form-control"
            value="1"
            min="1">

    </div>
    <button
    id="placeOrderBtn"
    class="btn btn-primary w-100 mt-3">

    Place Order

</button>

</div>

<script type="module" src="js/orders.js"></script>

</body>
</html>
